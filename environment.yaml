name: ProteomicsAgent
channels:
  - conda-forge
  - nvidia
  - defaults
dependencies:
  - python=3.11
  - cmake
  - gcc
  - gxx
  - cuda-toolkit
  - pip
  - pip:
    - openai>=1.30.0
    - anthropic>=0.25.0
    - requests>=2.31.0
    - matplotlib>=3.8.0
    - seaborn>=0.13.0
    - pandas>=2.2.0
    - numpy>=1.26.0
    # New: required by taxon.algorithms.abundance_em (multinomial-mixture EM plugin)
    - scipy>=1.11.0
    # Optional: enables non-trypsin in-silico digestion in abundance_em mapping_matrix
    # (a pure-python trypsin fallback ships with the plugin if pyteomics is absent).
    - pyteomics>=4.7.0
    - python-dotenv>=1.0.0
    - rich>=13.7.0
    - click>=8.1.0
    - questionary>=2.0.0
    - huggingface_hub>=0.23.0
